<style>
  @font-face{font-family:'SansitaDate';src:url('./Sansita-BlackItalic.ttf') format('truetype');font-display:swap;} 
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{background:#d7dade}html,body{width:100%;overflow-x:auto}body{background:#d7dade;font-family:Arial,Helvetica,sans-serif;color:#25384a;min-height:100dvh;overflow:auto;--mobile-scale:.83;--canvas-zoom:1;--board-height:1260px;--canvas-pan-x:0px;--canvas-pan-y:0px;--day-shift:0px;touch-action:none;overscroll-behavior:none}
  html.app-booting,body.app-booting{background:#5A3E6B!important;overflow:hidden!important}
  body.app-booting .topbar,body.app-booting .board{visibility:hidden;opacity:0}
  .startup-splash{position:fixed;inset:0;z-index:9999;background:#5A3E6B;display:block;border-radius:0!important;overflow:hidden;contain:strict;isolation:isolate;transform:none!important;transition:opacity .18s ease,visibility .18s ease}
  .startup-splash.hidden{opacity:0;visibility:hidden;pointer-events:none}

  .topbar{margin:10px 14px 12px;background:#F4C28B;border-radius:18px;height:88px;display:grid;grid-template-columns:auto minmax(120px,1fr) auto;align-items:center;padding:0 18px;gap:14px;box-shadow:0 2px 8px rgba(0,0,0,.18);overflow:hidden}
  .topbar.zoom-hidden{opacity:0;visibility:hidden;pointer-events:none;transition:opacity .12s ease,visibility .12s ease}
  .date-arrow-wrap{display:flex;align-items:center;justify-content:flex-start;gap:10px;min-width:118px;align-self:stretch}
  .date-arrow-btn{width:48px;height:68px;border:none;border-radius:20px;background:rgba(255,255,255,.56);color:#0f172a;font-size:38px;font-weight:900;box-shadow:0 2px 5px rgba(0,0,0,.12),inset 0 1px 0 rgba(255,255,255,.55);cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;padding-bottom:4px;flex:0 0 auto}
  .date-arrow-btn:active{transform:scale(.98);background:#dbeafe}
  .date-center{display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1;min-width:0;overflow:hidden}
  .date-title{font-family:'SansitaDate',system-ui,sans-serif;font-size:31px;font-weight:900;color:#0f1d33;letter-spacing:.2px;text-align:center;cursor:pointer;white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:clip}
  .date-title .current-day,.date-title .non-current-day{color:#8C6A46;-webkit-text-stroke:0;text-shadow:none}.date-title .non-current-day{text-decoration:underline;text-decoration-thickness:2px;text-underline-offset:4px}.today-badge{display:inline-flex;align-items:center;justify-content:center;margin-top:4px;padding:2px 8px;border-radius:999px;background:#facc15;color:#111827;font-size:10px;font-weight:900;letter-spacing:.7px;box-shadow:0 1px 4px rgba(0,0,0,.2);border:1px solid rgba(0,0,0,.18)}
  .right-tools{display:flex;align-items:center;justify-content:flex-end;gap:10px;flex-shrink:0}
  .cal-icon-btn{width:48px;height:48px;border:none;border-radius:12px;background:linear-gradient(180deg,#4f9cff 0%,#2563eb 100%);color:#fff;box-shadow:0 4px 10px rgba(37,99,235,.35),inset 0 1px 0 rgba(255,255,255,.35);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;flex:0 0 auto}
  .cal-icon-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:10px;background:rgba(255,255,255,.22);border-radius:12px 12px 5px 5px}
  .cal-icon-btn svg{width:25px;height:25px;stroke:#fff;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;position:relative;z-index:2}
  .header-total{height:54px;min-width:72px;padding:4px 8px;border-radius:12px;background:#93c5fd;border:2px solid #60a5fa;color:#111827;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:900;box-shadow:0 3px 8px rgba(0,0,0,.16)}.header-total .ht-label{font-size:10px;line-height:1.05;letter-spacing:.4px;text-align:center}.header-total .ht-count{font-size:24px;line-height:1;color:#000;margin-top:3px}.total-canvas{position:absolute;height:auto;min-width:0;padding:6px 8px;z-index:5;cursor:default;background:#93c5fd!important;border:2px solid #60a5fa!important;color:#111827!important}.board.resize-mode .total-canvas{cursor:move;outline:2px dashed #f59e0b;overflow:visible;z-index:30;touch-action:none}.total-canvas .ht-label{font-size:18px!important}.total-canvas .ht-count{font-size:82px!important;color:#000!important;line-height:.85;font-weight:900}.kennel.total-canvas .ht-count{font-size:82px!important}
  .refresh{width:48px;height:48px;border-radius:12px;background:rgba(255,255,255,.45);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.14),inset 0 1px 0 rgba(255,255,255,.45);border:none;flex:0 0 auto}.refresh svg{width:24px;height:24px;stroke:#0f172a;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .overflow-btn{width:24px;height:48px;border:none;border-radius:12px;background:transparent;color:#0f172a;font-size:30px;font-weight:900;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;flex:0 0 auto;margin-left:-2px;padding:0 0 4px 0}
  .overflow-btn:active{transform:scale(.96);background:rgba(255,255,255,.34)}
  .overflow-menu{position:fixed;top:76px;right:18px;z-index:1000;width:205px;background:#f8fafc;border:2px solid rgba(15,23,42,.14);border-radius:16px;box-shadow:0 12px 30px rgba(0,0,0,.24);padding:8px;display:none}
  .overflow-menu.open{display:block}
  .overflow-menu button{width:100%;border:none;background:transparent;border-radius:11px;padding:12px 10px;text-align:left;color:#0f172a;font-weight:900;font-size:15px;cursor:pointer}
  .overflow-menu button:active,.overflow-menu button:hover{background:#dbeafe}
  .backup-file-input{display:none}

  .board{position:relative;margin:0 14px 24px;width:980px;height:var(--board-height);background:#c9ced4;border:4px solid #f2a14e;border-radius:22px;overflow:hidden;touch-action:none;transform:translateX(var(--day-shift,0px));will-change:transform}
  .kennel{position:absolute;background:#f7f7f7;border:2px solid #9ba3ae;cursor:pointer;padding:6px 8px;color:#294158;overflow:hidden}
  .board.resize-mode .kennel{outline:2px dashed #f59e0b;overflow:visible;z-index:6;cursor:move;touch-action:none}
  .board.resize-mode .kennel.dragging{opacity:.82;box-shadow:0 8px 22px rgba(0,0,0,.32)}
  .resize-handle{display:none;position:absolute;background:#f59e0b;border:2px solid #fff;border-radius:999px;box-shadow:0 2px 6px rgba(0,0,0,.3);z-index:20}
  .board.resize-mode .resize-handle{display:block}
  .resize-handle.n{top:-8px;left:50%;width:22px;height:12px;transform:translateX(-50%);cursor:n-resize}
  .resize-handle.s{bottom:-8px;left:50%;width:22px;height:12px;transform:translateX(-50%);cursor:s-resize}
  .resize-handle.e{right:-8px;top:50%;width:12px;height:22px;transform:translateY(-50%);cursor:e-resize}
  .resize-handle.w{left:-8px;top:50%;width:12px;height:22px;transform:translateY(-50%);cursor:w-resize}
  .kennel:active{filter:brightness(.95)}
  .kennel.empty{border-color:#9ca3af;background:#f1f5f9}.kennel.occupied{background:#f7f7f7;border-color:#2563eb;box-shadow:0 0 0 2px rgba(37,99,235,.16) inset}.kennel.pickup{background:#fffef2;border:2px solid #111827;box-shadow:0 0 0 3px #facc15 inset,0 0 0 1px rgba(0,0,0,.22),0 0 12px rgba(250,204,21,.55)}.kennel.do-active{background:#d3ead8!important;border:3px solid #ffffff!important;border-radius:8px;box-shadow:0 0 0 1px rgba(17,24,39,.08)!important;transition:background-color .18s ease,border-color .18s ease,box-shadow .18s ease}.kennel.pickup.do-active{background:#d3ead8!important;border:3px solid #ffffff!important;border-radius:8px;box-shadow:0 0 0 1px rgba(17,24,39,.08)!important}
  .num{position:absolute;top:5px;left:8px;font-size:20px;font-weight:900;color:#2f465d}
  #k8 .num,#k9 .num,#k10 .num,#k11 .num,#k12 .num,#k13 .num{width:30px;height:30px;border:2px solid rgba(0,0,0,.08);border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:16px;line-height:1;background:#dbeafe;color:#111827;border-color:#3b82f6;top:4px;left:6px;font-weight:900;box-shadow:0 2px 5px rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.35)}
  .dog{position:absolute;left:10px;right:10px;top:58px;bottom:56px;font-weight:900;color:#0f1d33;line-height:1.08;word-break:break-word;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;text-align:center;gap:3px}
  #k8 .dog,#k9 .dog,#k10 .dog,#k11 .dog,#k12 .dog,#k13 .dog{top:42px;bottom:44px;text-align:center;align-items:center;justify-content:flex-start;gap:2px}
  .kennel.has-times .dog{bottom:54px}
  #k1.kennel.has-times .dog{bottom:54px}
  
  .dog.names-1{font-size:34px}.dog.names-2{font-size:32px}.dog.names-3{font-size:30px}.dog.names-4{font-size:28px;line-height:1.02}
  #k13 .dog.names-3,#k12 .dog.names-3,#k11 .dog.names-3,#k8 .dog.names-3,#k9 .dog.names-3,#k10 .dog.names-3{font-size:18px;line-height:1.02}
  #k13 .dog.names-4,#k12 .dog.names-4,#k11 .dog.names-4,#k8 .dog.names-4,#k9 .dog.names-4,#k10 .dog.names-4{font-size:16px;line-height:1}
  
  .dog-slot{padding:2px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center;width:100%}
  .kennel-times{position:absolute;left:10px;right:10px;bottom:8px;font-size:15px;font-weight:900;display:flex;gap:6px;flex-wrap:wrap;align-items:center;justify-content:flex-start;z-index:3;max-width:calc(100% - 20px)}
  .status-chip{display:inline-flex;align-items:center;justify-content:center;min-width:78px;height:24px;padding:2px 10px;border-radius:7px;font-size:14px;font-weight:900;line-height:1;color:#111827;border:2px solid rgba(0,0,0,.18);box-shadow:0 2px 4px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.35);white-space:nowrap}
  .status-chip.pu{background:#fde047;color:#111827;border-color:#ca8a04}.status-chip.do{background:#22c55e;color:#fff;border-color:#15803d}.status-time{display:inline-flex;align-items:center;height:24px;padding:0 3px;font-size:15px;font-weight:900;line-height:1}.status-time.pu{color:#15803d}.status-time.do{color:#111827}
  .tag{position:absolute;left:8px;bottom:5px;font-size:17px;font-weight:900;font-style:normal;color:#111827;text-transform:uppercase;letter-spacing:.3px}
  .tag-bird,.tag-tall{left:auto;right:8px;bottom:8px;display:flex;align-items:center;justify-content:center;min-width:82px;height:34px;padding:0 14px;border:2px solid #3b82f6;border-radius:999px;background:#dbeafe;color:#111827;font-size:18px;font-weight:900;letter-spacing:.5px;font-style:normal;box-shadow:0 2px 5px rgba(0,0,0,.14),inset 0 1px 0 rgba(255,255,255,.45);z-index:5}
  .tag-box{left:auto;right:8px;bottom:8px;display:flex;align-items:center;justify-content:center;min-width:56px;height:26px;padding:0 12px;border:2px solid #111827;border-radius:999px;background:#fff;color:#000;font-size:15px;font-weight:900;letter-spacing:.5px;box-shadow:0 2px 4px rgba(0,0,0,.14),inset 0 1px 0 rgba(255,255,255,.45);z-index:5}
  .tag.right{left:auto;right:8px}

  
  .cal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:45;padding:16px}.cal-overlay.open{display:flex}
  .cal-card{width:100%;max-width:380px;background:#f8fafc;border-radius:20px;padding:16px;box-shadow:0 12px 35px rgba(0,0,0,.28);color:#0f1d33}.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.cal-month{font-size:22px;font-weight:900;color:#0f1d33}.cal-nav{width:42px;height:38px;border:none;border-radius:10px;background:#3b82f6;color:#fff;font-size:20px;font-weight:900;cursor:pointer}
  .cal-weekdays,.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;text-align:center}.cal-weekdays div{font-size:11px;font-weight:900;color:#64748b;padding:5px 0}.cal-day{height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;cursor:pointer;background:#eef2f7;color:#334155;position:relative}.cal-day.blank{background:transparent;cursor:default}.cal-day.today{background:#dbeafe;color:#1d4ed8}.cal-day.selected{background:#2563eb;color:#fff}.cal-day.has-data::after{content:'';position:absolute;bottom:4px;width:5px;height:5px;border-radius:50%;background:#f59e0b}.cal-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.cal-action{border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:900;background:#e2e8f0;color:#334155;cursor:pointer}.cal-action.primary{background:#2563eb;color:#fff}

  .sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.10);display:none;align-items:flex-end;justify-content:center;z-index:50;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}.sheet-overlay.open{display:flex}
  .sheet{touch-action:auto;width:100%;max-width:640px;background:#f8fafc;background:rgba(248,250,252,.42);border:1px solid rgba(255,255,255,.38);border-radius:22px 22px 0 0;padding:10px 18px 18px;box-shadow:0 -14px 40px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.65);animation:slideUp .18s ease-out;color:#0f1d33;max-height:92vh;overflow-y:auto;backdrop-filter:blur(22px) saturate(170%);-webkit-backdrop-filter:blur(22px) saturate(170%)}
  @keyframes slideUp{from{transform:translateY(60px);opacity:.7}to{transform:translateY(0);opacity:1}}
  .handle{width:44px;height:5px;background:rgba(100,116,139,.45);border-radius:999px;margin:0 auto 8px}.sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}.sheet-title{font-size:22px;font-weight:900;color:#0f1d33}.sheet-date{font-size:12px;font-weight:800;color:#64748b;margin-bottom:8px}.clear-btn{background:#fee2e2;color:#b91c1c;border:1px solid #fecaca;border-radius:10px;padding:9px 12px;font-weight:900;cursor:pointer}
  .field{margin-bottom:8px}.name-control{margin-bottom:8px}.name-input-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}.clear-name-btn{height:42px;min-width:54px;border:none;border-radius:10px;background:#fee2e2;color:#b91c1c;font-size:12px;font-weight:900;letter-spacing:.4px;cursor:pointer}.clear-name-btn:active{transform:scale(.96);background:#fecaca}.size-row{display:flex;align-items:center;gap:10px;margin-top:6px}.size-row input[type="range"]{flex:1;padding:0;border:none;background:transparent}.size-label{font-size:12px;font-weight:900;color:#64748b;min-width:44px;text-align:right}.field label{display:block;font-size:12px;font-weight:900;letter-spacing:.8px;color:#475569;margin-bottom:5px}
  .field input,.field select{touch-action:manipulation;width:100%;border:2px solid rgba(203,213,225,.78);border-radius:12px;padding:10px 12px;font-size:18px;background:rgba(255,255,255,.54);color:#0f1d33;outline:none;font-family:Arial,Helvetica,sans-serif;box-shadow:inset 0 1px 0 rgba(255,255,255,.55)}.time-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field input:focus,.field select:focus{border-color:#3b82f6}.save-btn{width:100%;background:#2563eb;color:#fff;border:none;border-radius:14px;padding:13px;font-size:18px;font-weight:900;margin-top:4px;cursor:pointer}.cancel-btn{width:100%;background:transparent;color:#64748b;border:none;padding:13px;font-size:16px;font-weight:800;cursor:pointer}.time-line{font-size:13px;color:#64748b;font-weight:800;margin:-4px 0 12px}

  @media(max-width:900px){
    body{overflow:auto;background:#d7dade}
    .topbar{height:74px;margin:8px 8px 10px;padding:0 8px;border-radius:16px;width:calc(100vw - 16px);min-width:0;gap:5px;grid-template-columns:92px minmax(0,1fr) auto;transform:none;margin-bottom:10px}
    .date-arrow-wrap{min-width:92px;gap:8px;align-self:stretch;align-items:center}
    /* IMPORTANT: preserve approved tall pill arrows exactly */
    .date-arrow-btn{width:42px;height:58px;border-radius:18px;font-size:34px;flex:0 0 auto}
    .date-center{min-width:0;overflow:hidden;position:relative;z-index:1}
    .date-title{font-size:18px;white-space:nowrap;line-height:1;max-width:100%;overflow:hidden;text-overflow:clip;position:relative;z-index:1}
    .today-badge{font-size:8px;padding:1px 7px;margin-top:2px}
    .right-tools{gap:4px;flex-shrink:0;position:relative;z-index:2}
    .cal-icon-btn{width:32px;height:32px;border-radius:10px;flex-shrink:0;margin:0;position:relative;z-index:1}
    .cal-icon-btn svg{width:18px;height:18px}
    .refresh{width:32px;height:32px;border-radius:10px;margin-right:0;flex-shrink:0}.refresh svg{width:17px;height:17px}
    .overflow-btn{width:16px;height:32px;font-size:28px;margin-left:0;padding:0 0 3px 0;flex-shrink:0}
    
    .board{margin:0 8px 0;transform-origin:0 0;transform:translate(calc(var(--canvas-pan-x) + var(--day-shift,0px)),var(--canvas-pan-y)) scale(calc(var(--mobile-scale) * var(--canvas-zoom)));margin-bottom:0;height:var(--board-height);will-change:transform}
  }

  @media(max-width:900px) and (orientation:landscape){
    body{overflow:auto}
    .topbar{height:62px;margin:8px 10px 10px;padding:0 10px;min-width:0;width:calc(100vw - 20px);grid-template-columns:92px minmax(0,1fr) auto;gap:5px}
    .date-arrow-btn{width:42px;height:50px;border-radius:17px;font-size:32px}
    .date-title{font-size:22px;max-width:100%;overflow:hidden;text-overflow:clip;position:relative;z-index:1}
    .right-tools{gap:5px}
    .cal-icon-btn,.refresh{width:34px;height:34px}
    .overflow-btn{width:16px;height:34px;font-size:28px;margin-left:0}
    .board{margin:0 10px 12px;transform-origin:0 0;transform:translate(calc(var(--canvas-pan-x) + var(--day-shift,0px)),var(--canvas-pan-y)) scale(calc(var(--mobile-scale) * var(--canvas-zoom)));margin-bottom:0;will-change:transform}
  }

</style>

<body class="app-booting"><script>document.documentElement.classList.add('app-booting');</script><div class="startup-splash" id="startupSplash" aria-label="Loading Kennel Manager"></div>

<div class="overflow-menu" id="overflowMenu"><button type="button" onclick="toggleResizeMode()" id="resizeMenuBtn">Resize Layout</button><button type="button" onclick="copyDayToTomorrow()">Copy Day to Tomorrow</button><button type="button" onclick="exportBackup()">Export Backup</button><button type="button" onclick="triggerImportBackup()">Restore Backup</button></div><input class="backup-file-input" id="backupFileInput" type="file" accept="application/json" onchange="importBackup(event)">

function key(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}

function niceDate(k){const d=dateFromKey(k);const isToday=k===todayKey();const day=isToday?'<span class="current-day">'+DAYS[d.getDay()]+'</span>':'<span class="non-current-day">'+DAYS[d.getDay()]+'</span>';const yy=String(d.getFullYear()).slice(-2);return day+' '+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0')+'/'+yy}

function loadStored(primaryKey,backupKey,fallback){
  const parsed=safeJsonParse(localStorage.getItem(primaryKey),null);
  if(parsed!==null)return parsed;
  const recovered=safeJsonParse(localStorage.getItem(backupKey),null);
  if(recovered!==null){
    localStorage.setItem(primaryKey,JSON.stringify(recovered));
    return recovered;
  }
  return fallback;
}

  const current=localStorage.getItem(primaryKey);
  if(current)localStorage.setItem(backupKey,current);

}

function copyDayToTomorrow(){
  closeOverflowMenu();
  const source=dayData();
  const cleaned={};
  let skippedPickups=0;
  let copiedDropoffs=0;

  Object.keys(source).forEach(n=>{
    const groups=dogGroups(source[n]);
    const carry=groups.dogs
      .filter(d=>d.status!=='pickup')
      .map(d=>({name:d.name,size:d.size,status:'stay',time:''}));
    skippedPickups+=groups.pickup.length;
    copiedDropoffs+=groups.dropoff.length;
    if(carry.length)cleaned[n]={dogs:carry};
  });

  if(!Object.keys(cleaned).length){
    alert(skippedPickups
      ? 'No kennels were copied. All dogs on this day are marked PICK-UP.'
      : 'No kennel entries to copy from this day.');
    return;
  }

  const targetDate=dateFromKey(activeDate);
  targetDate.setDate(targetDate.getDate()+1);
  const targetKey=key(targetDate);
  const targetHasData=allData[targetKey]&&Object.keys(allData[targetKey]).length;
  const pickupNote=skippedPickups?`\n\n${skippedPickups} PICK-UP dog${skippedPickups===1?' was':'s were'} skipped.`:'';
  const dropoffNote=copiedDropoffs?`\n${copiedDropoffs} DROP-OFF dog${copiedDropoffs===1?' was':'s were'} copied as staying tomorrow.`:'';
  const message=(targetHasData
    ? 'Tomorrow already has kennel data. Replace it with this day?\n\nStaying dogs and drop-off dogs will copy. Pick-up dogs will be skipped. Times will be cleared.'
    : 'Copy this day to tomorrow?\n\nStaying dogs and drop-off dogs will copy. Pick-up dogs will be skipped. Times will be cleared.')+pickupNote+dropoffNote;

  if(!confirm(message))return;

  allData[targetKey]=cleaned;
  saveAll();
  activeDate=targetKey;
  render();
  alert('Copied to tomorrow. Pick-up dogs were skipped and copied dogs were set to staying.');
}

function importBackup(event){
  const file=event.target.files&&event.target.files[0];
  event.target.value='';
  if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const payload=JSON.parse(reader.result);
      if(!payload||typeof payload!=='object'||!payload.data||typeof payload.data!=='object')throw new Error('Invalid backup file');
      const ok=confirm('Restore this backup? This will replace the current saved kennel data on this device.');
      if(!ok)return;
      allData=payload.data;
      if(payload.layouts&&typeof payload.layouts==='object')kennelLayouts=payload.layouts;
      saveAll();
      saveLayouts();
      render();
      alert('Backup restored.');
    }catch(err){
      alert('Could not restore backup. Make sure this is a Kennel Manager backup file.');
    }
  };
  reader.readAsText(file);
}

function clampCanvasPan(x,y,zoom=getCanvasZoom()){
  if(zoom<=1.01)return {x:0,y:0};
  const board=document.getElementById('board');
  if(!board)return {x,y};

  const baseScale=parseFloat(getComputedStyle(document.body).getPropertyValue('--mobile-scale'))||1;
  const scaledW=board.offsetWidth*baseScale*zoom;
  const scaledH=board.offsetHeight*baseScale*zoom;
  const view=getViewportSize();
  const currentPan=getCanvasPan();
  const rect=board.getBoundingClientRect();

  /*
    Clamp against the board's real natural position on screen.
    The older clamp ignored the board/header offset, which cut off travel
    and made the canvas feel trapped before you could reach every area.
  */
  const naturalLeft=rect.left-currentPan.x;
  const naturalTop=rect.top-currentPan.y;
  const edgePad=28;

  let minX=view.w-edgePad-naturalLeft-scaledW;
  let maxX=edgePad-naturalLeft;
  let minY=view.h-edgePad-naturalTop-scaledH;
  let maxY=edgePad-naturalTop;

  if(minX>maxX){
    const centered=(view.w-scaledW)/2-naturalLeft;
    minX=maxX=centered;
  }
  if(minY>maxY){
    const centered=(view.h-scaledH)/2-naturalTop;
    minY=maxY=centered;
  }

  return {
    x:Math.min(maxX,Math.max(minX,x)),
    y:Math.min(maxY,Math.max(minY,y))
  };
}
function setCanvasPan(x,y){
  const clamped=clampCanvasPan(x,y);
  document.body.dataset.canvasPanX=String(clamped.x);
  document.body.dataset.canvasPanY=String(clamped.y);
  document.body.style.setProperty('--canvas-pan-x',clamped.x+'px');
  document.body.style.setProperty('--canvas-pan-y',clamped.y+'px');
}
function getCanvasPan(){return {x:Number(document.body.dataset.canvasPanX||0),y:Number(document.body.dataset.canvasPanY||0)}}
function setCanvasZoom(value,focalX=null,focalY=null){
  const board=document.getElementById('board');
  const oldZoom=getCanvasZoom();
  const newZoom=Math.min(3,Math.max(1,value));

  if(!board){
    document.body.dataset.canvasZoom=newZoom.toFixed(3);
    document.body.style.setProperty('--canvas-zoom',newZoom);
    updateZoomHeaderVisibility();
    return;
  }

  const view=getViewportSize();
  if(focalX===null||focalY===null){
    focalX=view.w/2;
    focalY=view.h/2;
  }

  const oldPan=getCanvasPan();
  const baseScale=parseFloat(getComputedStyle(document.body).getPropertyValue('--mobile-scale'))||1;
  const oldScale=baseScale*oldZoom;

  /*
    Work from the board's natural screen position, not the already-transformed
    position. This keeps the pinch center locked under your fingers instead of
    drifting to a corner.
  */
  const rect=board.getBoundingClientRect();
  const naturalLeft=rect.left-oldPan.x;
  const naturalTop=rect.top-oldPan.y;

  const worldX=(focalX-naturalLeft-oldPan.x)/oldScale;
  const worldY=(focalY-naturalTop-oldPan.y)/oldScale;

  document.body.dataset.canvasZoom=newZoom.toFixed(3);
  document.body.style.setProperty('--canvas-zoom',newZoom);
  updateMobileScale(false);

  const newBaseScale=parseFloat(getComputedStyle(document.body).getPropertyValue('--mobile-scale'))||1;
  const newScale=newBaseScale*newZoom;
  const nextX=focalX-naturalLeft-(worldX*newScale);
  const nextY=focalY-naturalTop-(worldY*newScale);

  if(newZoom<=1.01)setCanvasPan(0,0);
  else setCanvasPan(nextX,nextY);
  updateZoomHeaderVisibility();
}
function updateMobileScale(resetZoom=false){
  if(resetZoom) setCanvasZoom(1);
  if(window.innerWidth>900){
    document.body.style.setProperty('--mobile-scale',1);
    document.body.style.setProperty('--board-height','1260px');
    return;
  }

  const viewportWidth = window.visualViewport ? window.visualViewport.width : window.innerWidth;
  const viewportHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  const baseScale = Math.min(.83, (viewportWidth - 16) / 980);
  const topbar = document.querySelector('.topbar');
  const topbarVisibleHeight = topbar ? topbar.getBoundingClientRect().height + 18 : 0;

  /*
    Important: board height must NOT shrink when zoom increases. The previous
    version divided by zoom, which reduced the scrollable/pannable canvas and
    stopped you from navigating around while zoomed in.
  */
  const visibleBoardHeight = Math.max(520, viewportHeight - topbarVisibleHeight - 8);
  const boardHeight = Math.max(1260, visibleBoardHeight / baseScale);

  document.body.style.setProperty('--mobile-scale',baseScale);
  document.body.style.setProperty('--board-height',boardHeight+'px');
}

function pinchDistance(a,b){return Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY)}
function setupCanvasPinchZoom(){
  const board=document.getElementById('board');
  if(!board)return;

  const points=new Map();
  let panState=null;
  let pinchState=null;
  let movedDuringGesture=false;

  function beginPanFromPointer(e){
    const pan=getCanvasPan();
    panState={
      id:e.pointerId,
      startX:e.clientX,
      startY:e.clientY,
      panX:pan.x,
      panY:pan.y
    };
  }

  board.addEventListener('pointerdown',e=>{
    if(resizeMode)return;
    points.set(e.pointerId,e);
    try{board.setPointerCapture(e.pointerId)}catch{}

    if(points.size===1){
      movedDuringGesture=false;
      beginPanFromPointer(e);
    }

    if(points.size===2){
      movedDuringGesture=true;
      const vals=[...points.values()];
      pinchState={
        startDistance:pinchDistance(vals[0],vals[1]),
        startZoom:getCanvasZoom()
      };
      panState=null;
    }
  },{passive:false});

  board.addEventListener('pointermove',e=>{
    if(resizeMode||!points.has(e.pointerId))return;
    points.set(e.pointerId,e);

    if(points.size===1&&panState&&panState.id===e.pointerId&&getCanvasZoom()>1.01){
      const dx=e.clientX-panState.startX;
      const dy=e.clientY-panState.startY;
      if(Math.abs(dx)>3||Math.abs(dy)>3)movedDuringGesture=true;
      e.preventDefault();
      setCanvasPan(panState.panX+dx,panState.panY+dy);
      return;
    }

    if(points.size===2&&pinchState){
      movedDuringGesture=true;
      e.preventDefault();
      const vals=[...points.values()];
      const midX=(vals[0].clientX+vals[1].clientX)/2;
      const midY=(vals[0].clientY+vals[1].clientY)/2;
      if(!pinchState.startDistance)return;
      const nextZoom=pinchState.startZoom*(pinchDistance(vals[0],vals[1])/pinchState.startDistance);
      setCanvasZoom(nextZoom,midX,midY);
    }
  },{passive:false});

  function cleanup(e){
    points.delete(e.pointerId);
    if(points.size<2)pinchState=null;
    if(points.size===0){
      panState=null;
      setTimeout(()=>{movedDuringGesture=false},80);
    }
    if(points.size===1&&getCanvasZoom()>1.01){
      const remaining=[...points.values()][0];
      beginPanFromPointer(remaining);
    }
  }

  board.addEventListener('click',e=>{
    if(movedDuringGesture){
      e.preventDefault();
      e.stopPropagation();
    }
  },true);

  board.addEventListener('pointerup',cleanup);
  board.addEventListener('pointercancel',cleanup);
}

async function requestPersistentStorage(){
  if(!('storage' in navigator) || !navigator.storage.persist){
    document.body.dataset.persistentStorage='unsupported';
    return false;
  }
  try{
    const alreadyPersistent=await navigator.storage.persisted();
    if(alreadyPersistent){
      document.body.dataset.persistentStorage='granted';
      return true;
    }
    const granted=await navigator.storage.persist();
    document.body.dataset.persistentStorage=granted?'granted':'not-granted';
    return granted;
  }catch(err){
    console.warn('Persistent storage request failed:',err);
    document.body.dataset.persistentStorage='error';
    return false;
  }
}

function esc(s){return String(s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')}
function capitalizeName(str){
  const raw=String(str||'');
  let out='';
  let newWord=true;
  for(let i=0;i<raw.length;i++){
    const ch=raw.charAt(i);
    if(ch===' '){
      out+=ch;
      newWord=true;
    }else{
      out+=newWord?ch.toUpperCase():ch.toLowerCase();
      newWord=false;
    }
  }
  return out;
}
function autoCapitalize(input){
  const start=input.selectionStart,end=input.selectionEnd;
  input.value=capitalizeName(input.value);
  input.setSelectionRange(start,end);
}
const MAX_DOGS=8;
const DOG_TIME_OPTIONS=['','PU','DO','9-12','9-930','5-530','Poss?'];
function defaultDogSize(count,kennelNumber){

function timeOptions(selected=''){
  return DOG_TIME_OPTIONS.map(v=>`<option value="${esc(v)}" ${v===selected?'selected':''}>${v||'Time'}</option>`).join('');

function normalizeDogEntry(entry){
  if(!entry)return null;
  const name=capitalizeName(String(entry.name||'').trim());
  if(!name)return null;
  const status=['pickup','dropoff','stay'].includes(entry.status)?entry.status:'stay';
  return {name,size:Number(entry.size)||34,status,time:String(entry.time||'')};
}
function normalizeKennelDog(raw){
  if(!raw)return {dogs:[],time:''};
  if(Array.isArray(raw.dogs)){
    return {dogs:raw.dogs.map(normalizeDogEntry).filter(Boolean).slice(0,MAX_DOGS),time:raw.time||''};
  }
  const names=(raw.names||[]).map(name=>capitalizeName(String(name||'').trim())).filter(Boolean);
  const sizes=Array.isArray(raw.sizes)?raw.sizes:[];
  const legacyStatus=raw.pickupTime?'pickup':raw.dropoffTime?'dropoff':'stay';
  const legacyTime=raw.pickupTime||raw.dropoffTime||'';
  return {dogs:names.slice(0,MAX_DOGS).map((name,idx)=>({name,size:Number(sizes[idx])||34,status:legacyStatus,time:legacyTime})),time:raw.time||''};
}
function dogGroups(raw){
  const dogs=normalizeKennelDog(raw).dogs;
  return {
    dogs,
    staying:dogs.filter(d=>d.status==='stay'),
    pickup:dogs.filter(d=>d.status==='pickup'),
    dropoff:dogs.filter(d=>d.status==='dropoff')
  };
}
function displayDogsForCanvas(raw){
  const groups=dogGroups(raw);
  const primary=groups.staying.length?groups.staying:(groups.pickup.length?groups.pickup:groups.dropoff);
  const secondary=groups.staying.length?groups.pickup.concat(groups.dropoff):[];
  const shown=primary.concat(secondary).slice(0,4);
  return shown.length?shown:groups.dogs.slice(0,4);
}
function compactFamilyLabel(list){
  if(!list.length)return '';

  return esc(list[0].name)+' +'+(list.length-1);

function getSheetDogs(){
  const dogs=[];
  for(let i=1;i<=MAX_DOGS;i++){
    const name=capitalizeName(document.getElementById('dogName'+i)?.value.trim()||'');
    if(!name)continue;
    const row=document.getElementById('dogRow'+i);
    dogs.push({
      name,
      size:Number(document.getElementById('dogSize'+i)?.value)||34,
      status:row?.dataset.status||'stay',
      time:document.getElementById('dogTime'+i)?.value||''
    });
  }
  return dogs;

function getSheetNames(){return getSheetDogs().map(d=>d.name)}
function getSheetSizes(){return getSheetDogs().map(d=>d.size)}
function updateSizeLabel(i){const size=document.getElementById('dogSize'+i)?.value||34;const label=document.getElementById('dogSizeVal'+i);const input=document.getElementById('dogName'+i);if(label)label.textContent=size+'px';if(input)input.style.fontSize=size+'px'}
function previewFontSize(i){updateSizeLabel(i);previewCurrentKennel()}
function updateDogStatusButtons(i){
  const row=document.getElementById('dogRow'+i);if(!row)return;
  const status=row.dataset.status||'stay';
  [['Stay','stay'],['Pickup','pickup'],['Dropoff','dropoff']].forEach(([id,value])=>{
    const btn=document.getElementById('dog'+id+i);if(!btn)return;
    btn.classList.toggle('active-stay',status==='stay'&&value==='stay');
    btn.classList.toggle('active-pickup',status==='pickup'&&value==='pickup');
    btn.classList.toggle('active-dropoff',status==='dropoff'&&value==='dropoff');
  });
}
function setDogStatus(i,status,timeValue=null){
  const row=document.getElementById('dogRow'+i);if(!row)return;
  row.dataset.status=status;
  const time=document.getElementById('dogTime'+i);
  if(timeValue!==null&&time)time.value=timeValue;
  if(status==='stay'&&time)time.value='';
  updateDogStatusButtons(i);
  haptic('light');
  previewCurrentKennel();
}
function toggleDogSelection(i){
  const btn=document.getElementById('dogSelect'+i);if(!btn)return;
  btn.classList.toggle('selected');
  updateSelectedCount();
}
function selectedDogIndexes(){
  const selected=[];
  for(let i=1;i<=MAX_DOGS;i++){
    const btn=document.getElementById('dogSelect'+i);
    const name=document.getElementById('dogName'+i)?.value.trim();
    if(btn?.classList.contains('selected')&&name)selected.push(i);
  }
  return selected;
}
function updateSelectedCount(){
  const count=selectedDogIndexes().length;
  const el=document.getElementById('selectedCount');
  if(el)el.textContent=count+' selected';
}
function clearDogSelections(){
  for(let i=1;i<=MAX_DOGS;i++)document.getElementById('dogSelect'+i)?.classList.remove('selected');
  updateSelectedCount();
}
function applyBulkStatus(status){
  const selected=selectedDogIndexes();
  if(!selected.length){alert('Select one or more dogs first.');return;}
  const bulkTime=document.getElementById('bulkTime')?.value||'';
  selected.forEach(i=>setDogStatus(i,status,status==='stay'?'':bulkTime));
  updateSelectedCount();
}
function statusMarkup(label,value){
  if(!value)return '';
  const kind=label.toLowerCase();
  const displayLabel=label==='PU'?'PICK-UP':label==='DO'?'DROP-OFF':label;
  const showTime=value!==label?`<span class="status-time ${kind}">${esc(value)}</span>`:'';
  return `<span class="status-chip ${kind}">${displayLabel}</span>${showTime}`;
}
function statusSummaryLine(kind,list){
  if(!list.length)return '';
  const label=kind==='pickup'?'PICK-UP':'DROP-OFF';
  const times=[...new Set(list.map(d=>d.time).filter(Boolean))];
  const timeText=times.length===1?times[0]:(times.length>1?'MULTI':'');
  return `<div class="canvas-status-line ${kind}"><span>${label} ${list.length}</span>${timeText?`<span class="time">${esc(timeText)}</span>`:''}</div>`;
}
function kennelInnerHTML(k,dog){
  const groups=dogGroups(dog);
  const dogs=displayDogsForCanvas(dog);
  const names=dogs.map(d=>d.name),sizes=dogs.map(d=>d.size);
  const hasDog=groups.dogs.length>0;
  const hasPickup=groups.pickup.length>0,hasDropoff=groups.dropoff.length>0;
  const hasTwo=hasPickup&&hasDropoff;
  const status=statusSummaryLine('pickup',groups.pickup)+statusSummaryLine('dropoff',groups.dropoff);
  const tagClass=k.tag==='TALL'?'tag-tall':k.tag==='BOX'?'tag-box':k.tag==='BIRD'?'tag-bird':'';
  const dogHtml=hasDog?`<div class="dog names-${Math.min(names.length,4)}">${names.map((name,idx)=>`<div class="dog-slot" style="font-size:${sizes[idx]||34}px">${esc(name)}</div>`).join('')}</div>${hasTwo?'<div class="kennel-divider"></div>':''}${status?`<div class="canvas-status-summary">${status}</div>`:''}`:'';
  return `<div class="num">${k.n}</div>`+dogHtml+(k.tag?`<div class="tag ${tagClass} ${k.tagRight?'right':''}">${k.tag}</div>`:'');
}
function render(){document.getElementById('dateTitle').innerHTML=niceDate(activeDate);document.getElementById('todayBadgeContainer').innerHTML=activeDate===todayKey()?'<span class="today-badge">TODAY</span>':'';const board=document.getElementById('board');board.innerHTML='';const dd=dayData();let total=0;KENNELS.forEach(k=>{const dog=dd[k.n];const groups=dogGroups(dog);total+=groups.staying.length+groups.dropoff.length;const hasDog=groups.dogs.length>0;const hasPickup=groups.pickup.length>0,hasDropoff=groups.dropoff.length>0;const el=document.createElement('div');el.className='kennel '+(!hasDog?'empty':hasPickup?'pickup':'occupied')+(hasPickup||hasDropoff?' has-times dog-level-mixed':'')+(hasDropoff?' do-active':'')+(hasPickup&&hasDropoff?' has-two-statuses':'');el.id='k'+k.n;applyKennelLayout(el,k.n);el.innerHTML=kennelInnerHTML(k,dog);if(resizeMode)addResizeHandles(el,k.n);el.onclick=()=>{if(!resizeMode)editKennel(k.n)};board.appendChild(el)});const t=document.createElement('div');t.className='header-total kennel total-canvas';t.id='ktotal';applyKennelLayout(t,'total');t.innerHTML='<div class="ht-label">TOTAL</div><div class="ht-count">'+total+'</div>';if(resizeMode)addResizeHandles(t,'total');board.appendChild(t)}
function toggleResizeMode(){resizeMode=!resizeMode;const mb=document.getElementById('resizeMenuBtn');if(mb)mb.textContent=resizeMode?'Exit Resize Layout':'Resize Layout';document.getElementById('board').classList.toggle('resize-mode',resizeMode);closeOverflowMenu();render()}
function addResizeHandles(el,n){['n','s','e','w'].forEach(side=>{const h=document.createElement('div');h.className='resize-handle '+side;h.onpointerdown=e=>startResize(e,n,side);el.appendChild(h)});el.onpointerdown=e=>startDrag(e,n)}
function startDrag(e,n){if(e.target.classList.contains('resize-handle'))return;e.stopPropagation();e.preventDefault();const r=kennelLayouts[n];dragging={n,startX:e.clientX,startY:e.clientY,start:{...r}};document.getElementById('k'+n)?.classList.add('dragging');document.addEventListener('pointermove',doDrag,{passive:false});document.addEventListener('pointerup',stopDrag)}
function doDrag(e){if(!dragging)return;e.preventDefault?.();const scale=boardScale();const dx=(e.clientX-dragging.startX)/scale,dy=(e.clientY-dragging.startY)/scale;const {n,start}=dragging;kennelLayouts[n]={...start,left:Math.max(0,snap(start.left+dx)),top:Math.max(0,snap(start.top+dy))};const el=document.getElementById('k'+n);if(el)applyKennelLayout(el,n)}
function stopDrag(){if(dragging){document.getElementById('k'+dragging.n)?.classList.remove('dragging');saveLayouts()}document.removeEventListener('pointermove',doDrag);document.removeEventListener('pointerup',stopDrag);dragging=null}
function startResize(e,n,side){e.stopPropagation();e.preventDefault();const r=kennelLayouts[n];resizing={n,side,startX:e.clientX,startY:e.clientY,start:{...r}};document.addEventListener('pointermove',doResize,{passive:false});document.addEventListener('pointerup',stopResize)}
function doResize(e){if(!resizing)return;e.preventDefault?.();const scale=boardScale();const dx=(e.clientX-resizing.startX)/scale,dy=(e.clientY-resizing.startY)/scale;const {n,side,start}=resizing;const minW=55,minH=45;const r={...start};if(side==='e')r.width=Math.max(minW,snap(start.width+dx));if(side==='s')r.height=Math.max(minH,snap(start.height+dy));if(side==='w'){const nw=Math.max(minW,snap(start.width-dx));r.left=snap(start.left+(start.width-nw));r.width=nw}if(side==='n'){const nh=Math.max(minH,snap(start.height-dy));r.top=snap(start.top+(start.height-nh));r.height=nh}kennelLayouts[n]=r;const el=document.getElementById('k'+n);if(el)applyKennelLayout(el,n)}
function stopResize(){saveLayouts();document.removeEventListener('pointermove',doResize);document.removeEventListener('pointerup',stopResize);resizing=null}
function clearDogName(i){haptic('clear');const input=document.getElementById('dogName'+i);if(input)input.value='';const select=document.getElementById('dogSelect'+i);select?.classList.remove('selected');setDogStatus(i,'stay');previewCurrentKennel();input?.blur();document.activeElement?.blur();updateSelectedCount()}
function previewCurrentKennel(){if(!activeKennel)return;const el=document.getElementById('k'+activeKennel);const k=KENNELS.find(x=>x.n===activeKennel);if(!el||!k)return;const dogs=getSheetDogs();const dog=dogs.length?{dogs,time:dayData()[activeKennel]?.time||new Date().toISOString()}:null;const groups=dogGroups(dog);const hasDog=groups.dogs.length>0;const hasPickup=groups.pickup.length>0,hasDropoff=groups.dropoff.length>0;el.className='kennel '+(!hasDog?'empty':hasPickup?'pickup':'occupied')+(hasPickup||hasDropoff?' has-times dog-level-mixed':'')+(hasDropoff?' do-active':'')+(hasPickup&&hasDropoff?' has-two-statuses':'');applyKennelLayout(el,activeKennel);el.innerHTML=kennelInnerHTML(k,dog)}
function editKennel(n){
  activeKennel=n;
  if(!document.getElementById('dogName1'))buildDogRows();
  const dd=dayData();
  const kennel=normalizeKennelDog(dd[n]||{});
  document.getElementById('sheetTitle').textContent='Kennel '+n;
  document.getElementById('sheetDate').innerHTML=niceDate(activeDate);
  clearDogSelections();
  document.getElementById('bulkTime').value='';
  for(let i=1;i<=MAX_DOGS;i++){
    const dog=kennel.dogs[i-1]||null;

    const sizeInput=document.getElementById('dogSize'+i);

  updateSelectedCount();
  document.getElementById('sheetOverlay').classList.add('open');

}
function refreshCanvasAfterViewportChange(options={}){
  updateMobileScale();
  if(options.resetPan){
    setCanvasPan(0,0);
  }else{
    const p=getCanvasPan();
    setCanvasPan(p.x,p.y);
  }
  updateZoomHeaderVisibility();
  if(options.forceRender)render();
  if(options.scrollTop)window.scrollTo(0,0);
}
let layoutRefreshTimer=null;
let pendingLayoutRefresh={resetPan:false,forceRender:false,scrollTop:false};
function requestLayoutRefresh(options={}){
  pendingLayoutRefresh={
    resetPan:pendingLayoutRefresh.resetPan||!!options.resetPan,
    forceRender:pendingLayoutRefresh.forceRender||!!options.forceRender,
    scrollTop:pendingLayoutRefresh.scrollTop||!!options.scrollTop
  };
  clearTimeout(layoutRefreshTimer);
  const delay=Number.isFinite(options.delay)?options.delay:120;
  layoutRefreshTimer=setTimeout(()=>{
    const runOptions={...pendingLayoutRefresh};
    pendingLayoutRefresh={resetPan:false,forceRender:false,scrollTop:false};
    refreshCanvasAfterViewportChange(runOptions);
  },delay);
}
function closeSheet(){
  document.getElementById('sheetOverlay').classList.remove('open');
  document.activeElement?.blur();

  /*
    Android Chrome can restore the visual viewport in stages after closing
    the keyboard/bottom sheet. Queue these refreshes so repeated viewport
    events collapse into one stable layout update instead of several jumps.
  */
  setTimeout(()=>requestLayoutRefresh({scrollTop:true}),250);
  setTimeout(()=>requestLayoutRefresh({scrollTop:true}),650);
}
function overlayClose(e){if(e.target.id==='sheetOverlay')closeSheet()}

let lastHapticAt=0;
function haptic(type='light'){
  try{
    if(!('vibrate' in navigator))return;
    const now=Date.now();
    if(now-lastHapticAt<220)return;
    lastHapticAt=now;
    if(type==='success')navigator.vibrate([22,14,22]);
    else if(type==='clear')navigator.vibrate([30,18,30]);
    else navigator.vibrate(22);
  }catch(e){}
}
function setupHapticFeedback(){
  document.addEventListener('pointerdown',e=>{
    if(e.target.closest('.save-btn'))haptic('success');
    else if(e.target.closest('.clear-btn,.clear-name-btn'))haptic('clear');
    else if(e.target.closest('.dog-time,#bulkTime,.dog-status-btn,.bulk-btn,.dog-select'))haptic('light');
  },{passive:true});
}
function saveKennel(){const dogs=getSheetDogs();const dd={...dayData()};if(!dogs.length)delete dd[activeKennel];else dd[activeKennel]={dogs,time:normalizeKennelDog(dd[activeKennel]||{}).time||new Date().toISOString()};setDayData(dd);saveAll();haptic('success');closeSheet();render()}
function clearKennel(){const dd={...dayData()};delete dd[activeKennel];setDayData(dd);saveAll();haptic('clear');closeSheet();render()}

function openCalendar(){const d=dateFromKey(activeDate);calYear=d.getFullYear();calMonth=d.getMonth();calSelectedDate=activeDate;drawCalendar();document.getElementById('calOverlay').classList.add('open')}
function closeCalendar(){document.getElementById('calOverlay').classList.remove('open')}
function calendarOverlayClose(e){if(e.target.id==='calOverlay')closeCalendar()}
function moveCalMonth(dir){calMonth+=dir;if(calMonth>11){calMonth=0;calYear++}if(calMonth<0){calMonth=11;calYear--}drawCalendar()}
function drawCalendar(){const months=['January','February','March','April','May','June','July','August','September','October','November','December'];document.getElementById('calMonthLabel').textContent=months[calMonth]+' '+calYear;const grid=document.getElementById('calGrid');grid.innerHTML='';const firstDay=new Date(calYear,calMonth,1).getDay();const daysInMonth=new Date(calYear,calMonth+1,0).getDate();const today=key(new Date());for(let i=0;i<firstDay;i++){const blank=document.createElement('div');blank.className='cal-day blank';grid.appendChild(blank)}for(let d=1;d<=daysInMonth;d++){const thisKey=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');const el=document.createElement('div');el.className='cal-day';if(thisKey===today)el.classList.add('today');if(thisKey===calSelectedDate)el.classList.add('selected');if(allData[thisKey]&&Object.keys(allData[thisKey]).length)el.classList.add('has-data');el.textContent=d;el.onclick=()=>{calSelectedDate=thisKey;drawCalendar()};grid.appendChild(el)}}
function setCalendarDate(){activeDate=calSelectedDate;closeCalendar();render()}

let suppressNextKennelClick=false;
function isModalOrMenuOpen(){
  return document.getElementById('sheetOverlay')?.classList.contains('open') ||
         document.getElementById('calOverlay')?.classList.contains('open') ||
         document.getElementById('overflowMenu')?.classList.contains('open');
}
function setupDaySwipeNavigation(){
  const board=document.getElementById('board');
  if(!board)return;

  let swipeStart=null;
  const MIN_SWIPE_DISTANCE=80;
  const MAX_VERTICAL_DRIFT=75;

  board.addEventListener('pointerdown',e=>{
    if(resizeMode || getCanvasZoom()>1.01 || isModalOrMenuOpen())return;
    if(e.pointerType && e.pointerType!=='touch')return;
    if(e.target.closest('input,textarea,select,button'))return;
    swipeStart={
      id:e.pointerId,
      x:e.clientX,
      y:e.clientY,
      time:Date.now()
    };
  },{passive:true});

  board.addEventListener('pointerup',e=>{
    if(!swipeStart || swipeStart.id!==e.pointerId)return;
    const dx=e.clientX-swipeStart.x;
    const dy=e.clientY-swipeStart.y;
    const elapsed=Date.now()-swipeStart.time;
    swipeStart=null;

    if(resizeMode || getCanvasZoom()>1.01 || isModalOrMenuOpen())return;
    if(elapsed>900)return;
    if(Math.abs(dx)<MIN_SWIPE_DISTANCE)return;
    if(Math.abs(dy)>MAX_VERTICAL_DRIFT)return;
    if(Math.abs(dx)<Math.abs(dy)*1.45)return;

    suppressNextKennelClick=true;
    closeOverflowMenu();
    moveDay(dx<0?1:-1);
    setTimeout(()=>{suppressNextKennelClick=false},350);
  },{passive:true});

  ['pointercancel','lostpointercapture'].forEach(type=>{
    board.addEventListener(type,()=>{swipeStart=null},{passive:true});
  });

  document.addEventListener('click',e=>{
    if(!suppressNextKennelClick)return;
    e.stopPropagation();
    e.preventDefault();
    suppressNextKennelClick=false;
  },true);
}

function animateDaySlide(dir){
  const board=document.getElementById('board');
  const dateCenter=document.querySelector('.date-center');
  if(!board||getCanvasZoom()>1.01)return;

  const shift=dir>0?'72px':'-72px';
  const easing='cubic-bezier(.2,.85,.2,1)';

  board.style.transition='none';
  board.style.opacity='.78';
  document.body.style.setProperty('--day-shift',shift);

  if(dateCenter){
    dateCenter.style.transition='none';
    dateCenter.style.transform='translateX('+shift+')';
    dateCenter.style.opacity='.76';
  }

  void board.offsetWidth;

  board.style.transition='transform .28s '+easing+', opacity .28s ease';
  board.style.opacity='1';
  document.body.style.setProperty('--day-shift','0px');

  if(dateCenter){
    dateCenter.style.transition='transform .28s '+easing+', opacity .28s ease';
    dateCenter.style.transform='translateX(0)';
    dateCenter.style.opacity='1';
  }

  setTimeout(()=>{
    board.style.transition='';
    board.style.opacity='';
    if(dateCenter){
      dateCenter.style.transition='';
      dateCenter.style.transform='';
      dateCenter.style.opacity='';
    }
  },320);
}
function moveDay(dir){const d=dateFromKey(activeDate);d.setDate(d.getDate()+dir);activeDate=key(d);render();animateDaySlide(dir)}
function goToday(){activeDate=todayKey();render()}

function resetCanvasToHome(){
  document.body.dataset.canvasZoom='1.000';
  document.body.dataset.canvasPanX='0';
  document.body.dataset.canvasPanY='0';
  document.body.style.setProperty('--canvas-zoom',1);
  document.body.style.setProperty('--canvas-pan-x','0px');
  document.body.style.setProperty('--canvas-pan-y','0px');
}
const STARTUP_SPLASH_MIN_MS=850;
const startupBootStarted=Date.now();
function hideStartupSplash(){
  const splash=document.getElementById('startupSplash');
  if(splash){
    splash.classList.add('hidden');
    setTimeout(()=>splash.remove(),260);
  }
}
function stabilizeStartupLayout(){
  /*
    Startup stability patch:
    Do not build the kennel DOM until the mobile viewport/font metrics settle.
    Rendering early and then recalculating scale was the likely cause of intermittent
    kennel shape flicker during PWA launch.
  */
  resetCanvasToHome();
  updateMobileScale();
  updateZoomHeaderVisibility();

  const finishBoot=()=>{
    resetCanvasToHome();
    updateMobileScale();
    updateZoomHeaderVisibility();
    render();
    const elapsed=Date.now()-startupBootStarted;
    const remaining=Math.max(0,STARTUP_SPLASH_MIN_MS-elapsed);
    setTimeout(()=>{
      document.body.classList.remove('app-booting');
      document.documentElement.classList.remove('app-booting');
      hideStartupSplash();
      setTimeout(()=>{
        refreshCanvasAfterViewportChange();
        updateZoomHeaderVisibility();
      },300);
    },remaining);
  };

  const settleViewport=()=>new Promise(resolve=>setTimeout(resolve,260));

  if(document.fonts&&document.fonts.ready){
    Promise.all([
      Promise.race([document.fonts.ready,new Promise(resolve=>setTimeout(resolve,500))]),
      settleViewport()
    ]).then(()=>requestAnimationFrame(()=>requestAnimationFrame(finishBoot)));
  }else{
    settleViewport().then(()=>requestAnimationFrame(()=>requestAnimationFrame(finishBoot)));
  }
}

requestPersistentStorage();
buildDogRows();
stabilizeStartupLayout();
setupCanvasPinchZoom();
setupHapticFeedback();
setupDaySwipeNavigation();
